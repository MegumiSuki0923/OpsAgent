<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsAgent - 智能运维诊断</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #22d3ee;
    --accent-dim: rgba(34, 211, 238, 0.1);
    --red: #f87171;
    --green: #4ade80;
    --yellow: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  header {
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  header p {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .input-area {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0 1.5rem;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .result {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    display: none;
  }

  .result.visible { display: block; }

  .result h2 {
    font-size: 0.9rem;
    color: var(--accent);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .stats {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .stat {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .stat strong {
    color: var(--text);
    font-size: 1.1rem;
    display: block;
    margin-bottom: 0.15rem;
  }

  .report {
    font-size: 0.82rem;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
  }

  .report h3 { color: var(--accent); margin-top: 1rem; }

  .loading {
    display: none;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 0.8rem;
    margin-bottom: 1rem;
  }

  .loading.visible { display: flex; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .examples {
    margin-bottom: 1.5rem;
  }

  .examples p {
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .example-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .chip {
    background: var(--accent-dim);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 0.3rem 0.7rem;
    border-radius: 20px;
    font-size: 0.7rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .chip:hover { background: rgba(34, 211, 238, 0.2); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>⚡ OpsAgent</h1>
    <p>基于 MCP 的智能运维诊断系统 — 描述问题，获取诊断报告</p>
  </header>

  <div class="examples">
    <p>示例问题：</p>
    <div class="example-chips">
      <span class="chip" onclick="fillExample(this)">API Gateway 响应时间飙升到 500ms</span>
      <span class="chip" onclick="fillExample(this)">K8s Pod 频繁重启 OOMKilled</span>
      <span class="chip" onclick="fillExample(this)">MySQL 主从复制延迟超过 60 秒</span>
      <span class="chip" onclick="fillExample(this)">Nginx 502 Bad Gateway</span>
    </div>
  </div>

  <div class="input-area">
    <textarea id="query" rows="2" placeholder="描述你遇到的运维问题..."></textarea>
    <button id="btn" onclick="diagnose()">诊断</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>正在分析...</span>
  </div>

  <div class="result" id="result">
    <h2>📋 诊断报告</h2>
    <div class="stats">
      <div class="stat"><strong id="anomalyCount">0</strong>异常段</div>
      <div class="stat"><strong id="knowledgeCount">0</strong>知识命中</div>
      <div class="stat"><strong id="elapsed">0s</strong>耗时</div>
    </div>
    <div class="report" id="report"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';

function fillExample(el) {
  document.getElementById('query').value = el.textContent;
}

async function diagnose() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  const btn = document.getElementById('btn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');

  btn.disabled = true;
  loading.classList.add('visible');
  result.classList.remove('visible');

  const start = Date.now();

  try {
    const res = await fetch(`${API}/api/diagnose`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const data = await res.json();
    const elapsed = ((Date.now() - start) / 1000).toFixed(1);

    document.getElementById('anomalyCount').textContent = data.anomaly_count;
    document.getElementById('knowledgeCount').textContent = data.knowledge_count;
    document.getElementById('elapsed').textContent = elapsed + 's';
    document.getElementById('report').textContent = data.report;
    result.classList.add('visible');
  } catch (e) {
    document.getElementById('report').textContent = '⚠️ 连接失败，请确保 API 服务已启动 (python scripts/start_all.py)';
    result.classList.add('visible');
  } finally {
    btn.disabled = false;
    loading.classList.remove('visible');
  }
}

document.getElementById('query').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); diagnose(); }
});
</script>
</body>
</html>
